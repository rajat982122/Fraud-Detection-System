services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: fraud-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "cub zk-ready localhost 2181 30"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: fraud-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 40"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  mysql:
    image: mysql:8.0
    container_name: fraud-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: fraud_db
      MYSQL_USER: fraud_user
      MYSQL_PASSWORD: fraud_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -prootpass --silent"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  trainer:
    build:
      context: .
    container_name: fraud-trainer
    volumes:
      - .:/app
    command: python prepare_artifacts.py

  fastapi-app:
    build:
      context: .
    container_name: fraud-fastapi
    depends_on:
      trainer:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: transactions
      KAFKA_GROUP_ID: fraud-consumer-group
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: fraud_db
      MYSQL_USER: fraud_user
      MYSQL_PASSWORD: fraud_pass
      MODEL_PATH: artifacts/fraud_model.pkl
      PREPROCESSOR_PATH: artifacts/preprocessor.pkl
      STREAM_CSV_PATH: artifacts/stream_transactions.csv
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  consumer:
    build:
      context: .
    container_name: fraud-consumer
    depends_on:
      trainer:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: transactions
      KAFKA_GROUP_ID: fraud-consumer-group
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: fraud_db
      MYSQL_USER: fraud_user
      MYSQL_PASSWORD: fraud_pass
      MODEL_PATH: artifacts/fraud_model.pkl
      PREPROCESSOR_PATH: artifacts/preprocessor.pkl
    volumes:
      - .:/app
    command: >
      sh -c "python wait_for_services.py --kafka-host kafka --kafka-port 9092 --mysql-host mysql --mysql-port 3306 &&
      python consumer.py"

  producer:
    build:
      context: .
    container_name: fraud-producer
    depends_on:
      trainer:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: transactions
      STREAM_CSV_PATH: artifacts/stream_transactions.csv
    volumes:
      - .:/app
    command: >
      sh -c "python wait_for_services.py --kafka-host kafka --kafka-port 9092 --delay 5 &&
      python producer.py --bootstrap-servers kafka:9092"
    restart: "no"

  grafana:
    image: grafana/grafana:10.4.2
    container_name: fraud-grafana
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards

volumes:
  mysql_data:
  grafana_data:
